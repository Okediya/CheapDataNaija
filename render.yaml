databases:
  - name: cheapdatanaija-db
    plan: free
    region: frankfurt
    databaseName: cheapdatanaija
    user: cheapdatanaija

services:
  - type: web
    name: cheapdatanaija-bot
    runtime: docker
    plan: free
    region: frankfurt
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: SMEDATA_TOKEN
        sync: false
      - key: WEBHOOK_HOST
        sync: false
      - key: WEBHOOK_PATH
        value: /webhook/bot
      - key: DATABASE_URL
        fromDatabase:
          name: cheapdatanaija-db
          property: connectionString
    healthCheckPath: /health
